<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airport Pickup Sign</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    /* ── Landing / Input Screen ── */
    #input-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.6s ease;
    }

    #input-screen h1 {
      color: #e0e0e0;
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #name-input {
      width: 320px;
      max-width: 90vw;
      padding: 14px 20px;
      font-size: 1.3rem;
      border: 2px solid #444;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    #name-input:focus {
      border-color: #e94560;
    }

    #show-btn {
      padding: 12px 40px;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background 0.3s, transform 0.2s;
    }

    #show-btn:hover {
      background: #c81e45;
      transform: scale(1.05);
    }

    /* ── Sign Screen ── */
    #sign-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 20px;
    }

    .sign-container {
      position: relative;
      background: #ffffff;
      border: 8px solid #222;
      border-radius: 18px;
      padding: 40px 70px;
      max-width: 92vw;
      min-width: 340px;
      text-align: center;
      box-shadow:
        0 0 0 4px #fff,
        0 0 0 8px #222,
        0 20px 60px rgba(0, 0, 0, 0.5);
      animation: signAppear 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sign-header {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 6px;
      color: #888;
      margin-bottom: 12px;
    }

    .sign-name {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      color: #111;
      text-transform: uppercase;
      letter-spacing: 4px;
      word-break: break-word;
      line-height: 1.15;
      animation: nameGlow 2s ease-in-out infinite alternate;
    }

    .sign-footer {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Decorative corner dots */
    .sign-container::before,
    .sign-container::after {
      content: '●';
      position: absolute;
      font-size: 18px;
      color: #e94560;
    }

    .sign-container::before {
      top: 12px;
      left: 18px;
    }

    .sign-container::after {
      top: 12px;
      right: 18px;
    }

    /* ── Action buttons row ── */
    .actions {
      display: flex;
      gap: 16px;
      margin-top: 32px;
    }

    .action-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.2s;
      backdrop-filter: blur(6px);
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.15);
    }

    .action-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes signAppear {
      from { opacity: 0; transform: scale(0.8) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes nameGlow {
      from { text-shadow: 0 0 0 transparent; }
      to   { text-shadow: 0 0 18px rgba(233, 69, 96, 0.3); }
    }

    /* ── Landscape encouragement ── */
    @media (orientation: portrait) and (max-width: 768px) {
      .rotate-hint {
        display: block;
      }
    }

    .rotate-hint {
      display: none;
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    /* Fullscreen-friendly */
    @media (orientation: landscape) {
      .sign-container {
        padding: 50px 90px;
      }
    }
  </style>
</head>
<body>

  <!-- Input Screen -->
  <div id="input-screen">
    <h1>✈️ Airport Pickup Sign</h1>
    <input id="name-input" type="text" placeholder="Enter passenger name" maxlength="40" autocomplete="off">
    <button id="show-btn">Show Sign</button>
  </div>

  <!-- Sign Screen -->
  <div id="sign-screen">
    <div class="sign-container">
      <div class="sign-header">Welcome — Arrivals</div>
      <div class="sign-name" id="sign-name"></div>
      <div class="sign-footer">✈ Airport Pickup</div>
    </div>

    <div class="actions">
      <!-- Edit button -->
      <button class="action-btn" id="edit-btn" title="Edit name">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
      <!-- Share button -->
      <button class="action-btn" id="share-btn" title="Share link">
        <svg viewBox="0 0 24 24"><path d="M18 16.08a2.91 2.91 0 0 0-1.96.77L8.91 12.7a3.25 3.25 0 0 0 0-1.4l7.05-4.11A2.93 2.93 0 1 0 15 5a2.87 2.87 0 0 0 .05.5L8 9.61a3 3 0 1 0 0 4.78l7.05 4.12a2.85 2.85 0 0 0-.05.49 3 3 0 1 0 3-3z"/></svg>
      </button>
    </div>

    <div class="rotate-hint">↻ Rotate to landscape for best experience</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const inputScreen = document.getElementById('input-screen');
    const signScreen  = document.getElementById('sign-screen');
    const nameInput   = document.getElementById('name-input');
    const showBtn     = document.getElementById('show-btn');
    const signName    = document.getElementById('sign-name');
    const editBtn     = document.getElementById('edit-btn');
    const shareBtn    = document.getElementById('share-btn');
    const toast       = document.getElementById('toast');

    /* ── Helpers ── */
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function buildShareURL(name) {
      const url = new URL(window.location.href.split('?')[0]);
      url.searchParams.set('name', name);
      return url.toString();
    }

    function displaySign(name) {
      signName.textContent = name;
      inputScreen.style.display = 'none';
      signScreen.style.display  = 'flex';

      // Update URL without reload
      const newURL = buildShareURL(name);
      window.history.replaceState(null, '', newURL);

      document.title = name + ' — Airport Pickup Sign';
    }

    /* ── Show sign ── */
    showBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) {
        nameInput.focus();
        return;
      }
      displaySign(name);
    });

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') showBtn.click();
    });

    /* ── Edit ── */
    editBtn.addEventListener('click', () => {
      signScreen.style.display  = 'none';
      inputScreen.style.display = 'flex';
      nameInput.value = signName.textContent;
      nameInput.focus();
      nameInput.select();

      // Clear URL param
      window.history.replaceState(null, '', window.location.pathname);
      document.title = 'Airport Pickup Sign';
    });

    /* ── Share ── */
    shareBtn.addEventListener('click', async () => {
      const url = buildShareURL(signName.textContent);

      if (navigator.share) {
        try {
          await navigator.share({ title: 'Airport Pickup Sign', url });
        } catch {
          /* user cancelled — ignore */
        }
      } else if (navigator.clipboard) {
        await navigator.clipboard.writeText(url);
        showToast('Link copied to clipboard!');
      } else {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Link copied!');
      }
    });

    /* ── On load: check URL param ── */
    (function init() {
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name');
      if (name) {
        displaySign(name);
      }
    })();
  </script>
</body>
</html>
